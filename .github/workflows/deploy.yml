name: CI/CD Pipeline to Azure VM

on:
  push:
    branches:
      - prod
    paths-ignore:
      - 'arquitecturas/microservicios/apps/backend/medicaments-service/**'
      - 'arquitecturas/microservicios/apps/frontend/medicaments-microfrontend/**'

jobs:
  # ==========================================
  # FASE 1A: ANÁLISIS DE CALIDAD (paralelo con test)
  # ==========================================
  sonarqube:
    name: SonarQube
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@7006c4492b2e0ee0f816d36501671557c97f5995 # v8.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ==========================================
  # FASE 1B: BUILD & TEST (paralelo con sonarqube)
  # ==========================================
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # ── CACHÉ FRONTEND ──────────────────────────────────────────
      # Guarda node_modules entre ejecuciones. Si package-lock.json
      # no cambió, se restaura en ~10s en vez de reinstalar todo.
      - name: Caché dependencias Frontend
        uses: actions/cache@v4
        with:
          path: arquitecturas/microservicios/apps/frontend/frontend/node_modules
          key: frontend-${{ runner.os }}-${{ hashFiles('arquitecturas/microservicios/apps/frontend/frontend/package-lock.json') }}
          restore-keys: |
            frontend-${{ runner.os }}-

      # ── CACHÉ BACKEND ───────────────────────────────────────────
      - name: Caché dependencias Backend
        uses: actions/cache@v4
        with:
          path: arquitecturas/microservicios/apps/backend/backend/node_modules
          key: backend-${{ runner.os }}-${{ hashFiles('arquitecturas/microservicios/apps/backend/backend/package-lock.json') }}
          restore-keys: |
            backend-${{ runner.os }}-

      - name: Backend - Instalar
        working-directory: ./arquitecturas/microservicios/apps/backend/backend
        run: npm ci   # más rápido y reproducible que npm install

      - name: Backend - Pruebas
        working-directory: ./arquitecturas/microservicios/apps/backend/backend
        env:
          NODE_ENV: test
        run: npm run test

  # ==========================================
  # FASE 2: DESPLIEGUE EN AZURE
  # Espera test; sonarqube corre en paralelo y NO bloquea deploy.
  # Si quieres que SonarQube también bloquee, agrega sonarqube a needs.
  # ==========================================
  deploy:
    name: Deploy to Azure
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Ejecutar comandos de despliegue vía SSH
        # Versión pinada → no resuelve @master en cada run (más rápido y seguro)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd ~/SalUD/arquitecturas/microservicios

            # ── ACTUALIZAR CÓDIGO ──────────────────────────────────
            git fetch origin prod
            git checkout prod
            git reset --hard origin/prod

            # ── HELPERS PARA .env ──────────────────────────────────
            add_if_not_exists() {
              local key="$1" value="$2" env_file="apps/frontend/frontend/.env"
              [ ! -f "$env_file" ] && touch "$env_file"
              if grep -q "^${key}=" "$env_file"; then
                echo "✓ ${key} ya existe"
              else
                echo "${key}=${value}" >> "$env_file"
                echo "✓ ${key} agregado"
              fi
            }

            add_to_infra() {
              local key="$1" value="$2" env_file="infra/dev.env"
              [ ! -f "$env_file" ] && touch "$env_file"
              if grep -q "^${key}=" "$env_file"; then
                sed -i "s|^${key}=.*|${key}=${value}|" "$env_file"
                echo "✓ ${key} actualizado"
              else
                echo "${key}=${value}" >> "$env_file"
                echo "✓ ${key} agregado"
              fi
            }

            add_if_not_exists "VITE_API_URL"                  "${{ secrets.VITE_API_URL }}"
            add_if_not_exists "VITE_MEDICAMENTS_REMOTE_URL"   "${{ secrets.VITE_MEDICAMENTS_REMOTE_URL }}"
            add_if_not_exists "VITE_MEDICAMENTS_API_URL"      "${{ secrets.VITE_MEDICAMENTS_API_URL }}"
            add_to_infra      "VITE_MEDICAMENTS_REMOTE_URL"   "${{ secrets.VITE_MEDICAMENTS_REMOTE_URL }}"
            add_to_infra      "VITE_API_URL"                  "${{ secrets.VITE_API_URL }}"

            # ── DESPLIEGUE SIN DOWNTIME ────────────────────────────
            # 1. Construye las imágenes ANTES de bajar los contenedores.
            #    Así el tiempo de "apagado" se reduce a segundos.
            docker compose \
              --env-file infra/dev.env \
              -f infra/docker-compose.prod.yaml \
              build --pull

            # 2. Reemplaza los contenedores con los ya construidos.
            #    --no-build evita reconstruir; --remove-orphans limpia residuos.
            docker compose \
              --env-file infra/dev.env \
              -f infra/docker-compose.prod.yaml \
              up -d --no-build --remove-orphans

            # 3. Limpiar imágenes huérfanas para no llenar el disco
            docker image prune -f