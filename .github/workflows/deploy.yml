name: CI/CD Pipeline to Azure VM

# ¿Por qué esto? 
# Define cuándo se ejecutará el flujo. Aquí le decimos que corra automáticamente
# cada vez que alguien suba código (push) a la rama 'master' o 'main'.
on:
  push:
    branches:
      - feat131f

jobs:
  # ==========================================
  # FASE 1: PRUEBAS BÁSICAS (Integración)
  # ==========================================
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18' # Puedes ajustarlo a la versión de Node que uses

      - name: Instalar dependencias del Frontend
        working-directory: ./arquitecturas/capas/apps/frontend/frontend
        run: npm ci

      - name: Ejecutar pruebas del Frontend (Jest)
        working-directory: ./arquitecturas/capas/apps/frontend/frontend
        continue-on-error: true
        run: npm run test

# --- 2. PRUEBAS DEL BACKEND PRINCIPAL (Las que van a crear) ---
      - name: Backend - Instalar
        working-directory: ./arquitecturas/capas/apps/backend/backend
        run: npm install

      - name: Backend - Pruebas
        working-directory: ./arquitecturas/capas/apps/backend/backend
        env:
          NODE_ENV: test
        run: npm run test

  # ==========================================
  # FASE 2: DESPLIEGUE EN AZURE (Entrega)
  # ==========================================
  deploy:
    name: Deploy to Azure
    needs: test 
    runs-on: ubuntu-latest
    steps:
      - name: Ejecutar comandos de despliegue vía SSH
        uses: appleboy/ssh-action@master
        env:
          VITE_MEDICAMENTS_REMOTE_URL: ${{ secrets.VITE_MEDICAMENTS_REMOTE_URL }}
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          # Esto le dice a la acción que pase estas variables al entorno SSH
          script: |
            cd ~/SalUD/arquitecturas/capas
            
            # Traer los últimos cambios de la rama feat131f
            git fetch origin feat131f
            git checkout feat131f
            git reset --hard origin/feat131f

            VITE_MEDICAMENTS_REMOTE_URL=$VITE_MEDICAMENTS_REMOTE_URL \
            VITE_API_URL=$VITE_API_URL \
            docker compose --env-file infra/dev.env -f infra/docker-compose.prod.yaml down
            
            VITE_MEDICAMENTS_REMOTE_URL=$VITE_MEDICAMENTS_REMOTE_URL \
            VITE_API_URL=$VITE_API_URL \
            docker compose --env-file infra/dev.env -f infra/docker-compose.prod.yaml up -d --build