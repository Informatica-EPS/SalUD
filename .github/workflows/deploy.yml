name: CI/CD Pipeline to Azure VM

# ¿Por qué esto? 
# Define cuándo se ejecutará el flujo. Aquí le decimos que corra automáticamente
# cada vez que alguien suba código (push) a la rama 'master' o 'main'.
on:
  push:
    branches:
      - prod
    paths-ignore:
      - 'arquitecturas/microservicios/apps/backend/medicaments-service/**'
      - 'arquitecturas/microservicios/apps/frontend/medicaments-microfrontend/**'

jobs:
  # ==========================================
  # FASE 1: PRUEBAS BÁSICAS (Integración)
  # ==========================================
  sonarqube:
    name: SonarQube
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@7006c4492b2e0ee0f816d36501671557c97f5995 # v8.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18' # Puedes ajustarlo a la versión de Node que uses

      - name: Instalar dependencias del Frontend
        working-directory: ./arquitecturas/microservicios/apps/frontend/frontend
        run: npm ci

      - name: Ejecutar pruebas del Frontend (Jest)
        working-directory: ./arquitecturas/microservicios/apps/frontend/frontend
        continue-on-error: true
        run: npm run test

# --- 2. PRUEBAS DEL BACKEND PRINCIPAL (Las que van a crear) ---
      - name: Backend - Instalar
        working-directory: ./arquitecturas/microservicios/apps/backend/backend
        run: npm install

      - name: Backend - Pruebas
        working-directory: ./arquitecturas/microservicios/apps/backend/backend
        env:
          NODE_ENV: test
        run: npm run test

  # ==========================================
  # FASE 2: DESPLIEGUE EN AZURE (Entrega)
  # ==========================================
  deploy:
    name: Deploy to Azure
    needs: test 
    runs-on: ubuntu-latest
    steps:
      - name: Ejecutar comandos de despliegue vía SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/SalUD/arquitecturas/microservicios
            
            # Traer los últimos cambios de la rama prod
            git fetch origin prod
            git checkout prod
            git reset --hard origin/prod

            # 🔑 Script para agregar secrets solo si no existen
            add_if_not_exists() {
              local key="$1"
              local value="$2"
              local env_file="apps/frontend/frontend/.env"
              
              # Crear el archivo si no existe
              if [ ! -f "$env_file" ]; then
                touch "$env_file"
              fi
              
              # Verificar si la variable ya existe en el archivo
              if grep -q "^${key}=" "$env_file"; then
                echo "✓ ${key} ya existe en ${env_file}"
              else
                echo "${key}=${value}" >> "$env_file"
                echo "✓ ${key} agregado a ${env_file}"
              fi
            }

            # Agregar VITE_API_URL a apps/frontend/frontend/.env
            add_if_not_exists "VITE_API_URL" "${{ secrets.VITE_API_URL }}"
            add_if_not_exists "VITE_MEDICAMENTS_REMOTE_URL" "${{ secrets.VITE_MEDICAMENTS_REMOTE_URL }}"
            add_if_not_exists "VITE_MEDICAMENTS_API_URL" "${{ secrets.VITE_MEDICAMENTS_API_URL }}"
            
            echo "Contenido de apps/frontend/frontend/.env:"
            cat apps/frontend/frontend/.env
            
            # 🔑 Script para agregar secrets a infra/dev.env
            add_to_infra() {
              local key="$1"
              local value="$2"
              local env_file="infra/dev.env"
              
              # Crear el archivo si no existe
              if [ ! -f "$env_file" ]; then
                touch "$env_file"
              fi
              
              # Verificar si la variable ya existe en el archivo
              if grep -q "^${key}=" "$env_file"; then
                # Reemplazar la línea existente
                sed -i "s/^${key}=.*/${key}=${value}/" "$env_file"
                echo "✓ ${key} actualizado en ${env_file}"
              else
                echo "${key}=${value}" >> "$env_file"
                echo "✓ ${key} agregado a ${env_file}"
              fi
            }

            # Agregar VITE_MEDICAMENTS_REMOTE_URL a infra/dev.env
            add_to_infra "VITE_MEDICAMENTS_REMOTE_URL" "${{ secrets.VITE_MEDICAMENTS_REMOTE_URL }}"
            add_to_infra "VITE_API_URL" "${{ secrets.VITE_API_URL }}"
            
            echo "Contenido de infra/dev.env:"
            cat infra/dev.env
            
            # Desplegar
            docker compose --env-file infra/dev.env -f infra/docker-compose.prod.yaml down
            docker compose --env-file infra/dev.env -f infra/docker-compose.prod.yaml up -d --build