services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - db

  backend:
    build: ../apps/backend
    command: npm run dev
    volumes:
      - ../apps/backend:/app
      - /app/node_modules
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgres://user_admin:super_password_123@db:5432/mi_base_de_datos #TODO
      - DB_NAME=mi_base_de_datos
      - DB_USER=user_admin
      - DB_PASSWORD=super_password_123
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DIALECT=postgres
      - NODE_ENV=development
      - PORT=5000
    depends_on:
      - db

  frontend:
    build: ../apps/frontend
    volumes:
      - ../apps/frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    stdin_open: true
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
      - WDS_SOCKET_PORT=0

volumes:
  pgdata:
  pgadmin_data:
