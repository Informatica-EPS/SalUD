services:
  backend:
    build: ../apps/backend
    command: npm run dev
    volumes:
      - ../apps/backend:/app
      - /app/node_modules
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgres://user_admin:super_password_123@db:5432/mi_base_de_datos #TODO
      - NODE_ENV=development
      - PORT=5000

  frontend:
    build: ../apps/frontend
    volumes:
      - ../apps/frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    stdin_open: true
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
      - WDS_SOCKET_PORT=0
