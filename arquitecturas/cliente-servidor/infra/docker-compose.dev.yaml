services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - db

  backend:
    build:
      context: ../apps/backend
      dockerfile: Dockerfile
    # Este comando intenta hacer un ping al puerto 5432 de la db antes de arrancar nodemon
    command: >
      sh -c "until nc -z db 5432; do
               echo 'Esperando a que la base de datos esté lista...'
               sleep 2
             done;
             echo 'Base de datos conectada. Arrancando Backend...'
             npx nodemon -L src/index.js"
    volumes:
      - ../apps/backend:/app
      - /app/node_modules
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgres://user_admin:${DB_PASSWORD}@db:5432/${DB_NAME}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DIALECT=postgres
      - NODE_ENV=development
      - PORT=5000
    depends_on:
      - db

  frontend:
    build: 
      context: ../apps/frontend
      dockerfile: Dockerfile
      target: development # <--- AGREGAR ESTO
    volumes:
      - ../apps/frontend:/app
      - /app/node_modules
    ports:
      - "8080:8080"
    stdin_open: true
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
      - WDS_SOCKET_PORT=0

volumes:
  pgdata:
  pgadmin_data:
