version: '3.8'

services:
  # Backend: Node.js
  backend:
    build: ./backend
    container_name: node_backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgres://user_admin:super_password_123@db:5432/mi_base_de_datos
      PORT: 5000
    depends_on:
      - db

  # Frontend: React
  frontend:
    build: ./frontend
    container_name: react_frontend
    restart: always
    ports:
      - "3000:3000"
    stdin_open: true # Necesario para que React no se detenga en modo interactivo
    depends_on:
      - backend

volumes:
  db_data: